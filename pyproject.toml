[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mdir-arcpy-utils-public"
version = "0.0.3"
description = "Conda-based ArcPy utilities for ArcGIS Pro 3.5"
readme = "README.md"
requires-python = ">=3.11,<3.14"
authors = [
  { name = "Miljodirektoratet" }
]
license = { text = "MIT" }
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent"
]

dependencies = []

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pixi.workspace]
name = "mdir-arcpy-utils-public"
authors = ["Miljodirektoratet"]
channels = ["esri", "conda-forge", "defaults"]
platforms = ["win-64"]

[tool.pixi.dependencies]
python = "3.11.*"
arcgispro = "3.5.*"
arcpy = "3.5.*"
pip = "*"

[tool.pixi.tasks]
install-editable = "python -m pip install -e ."
